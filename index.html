<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kurshantering</title>
  </head>
  <body>

    <h1>Kurshantering</h1>

    <form id="courseForm">

      <input 
      type="text"
      id="code"
      placeholder="Kurskod"
      required>

      <input 
      type="text"
      id="name"
      placeholder="Kursnamn"
      required>

      <select id="progression">
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>

      <input 
      type="url"
      id="syllabus"
      placeholder="URL till kursplan"
      required>

      <button type="submit">
        Lägg till kurs
      </button>

    </form>

    <ul id="courseList"></ul>


    <div id="app"></div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
