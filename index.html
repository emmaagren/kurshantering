<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kurshantering</title>
  </head>

  <body>
    <main class="container">
      <h1>Kurshantering</h1>

    <form id="courseForm" class="course-form">
      <label for="code">Kurskod</label>
      <input type="text" id="code" required />

      <label for="name">Kursnamn</label>
      <input type="text" id="name" required />

      <label for="progression">Progression</label>
      <select id="progression" required>
        <option value="">Välj progression</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>

      <label for="syllabus">Länk till kursplan</label>
      <input type="url" id="syllabus" required />

      <button type="submit">Lägg till kurs</button>
    </form>

    <section>
      <h2>Mina kurser</h2>
      <ul id="courseList" class="course-list"></ul>
    </section>

    </main>

    <script type="module" src="/src/main.ts"></script>

  </body>
</html>
